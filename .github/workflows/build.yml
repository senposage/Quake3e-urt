name: build

on:
  pull_request:
    branches:
      - re-impl
    paths-ignore:
      - '**.md'
      - '*.txt'
      - '.gitignore'
      - 'docs/*'
  push:
    branches:
      - re-impl
    paths-ignore:
      - '**.md'
      - '*.txt'
      - '.gitignore'
      - 'docs/*'
  release:
    types: [published]

  workflow_dispatch:

jobs:
  windows-msys:
    name: ${{ matrix.btype }} Windows-${{ matrix.cc }} ${{ matrix.arch }}
    if: github.event_name != 'release' || github.event.release.target_commitish == 're-impl'
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x86_64]
        cc: [gcc]
        btype: [Release, Debug]
        include:
          - arch: x86
            msystem: MINGW32
            prefix: mingw-w64-i686

          - arch: x86_64
            msystem: MINGW64
            prefix: mingw-w64-x86_64

          - btype: Release
            rule: install

          - btype: Debug
            rule: debug

    defaults:
      run:
        shell: msys2 {0}

    steps:

    - uses: msys2/setup-msys2@v2
      with:
        install: base-devel ${{ matrix.prefix }}-binutils ${{ matrix.prefix }}-make ${{ matrix.prefix }}-${{ matrix.cc }}
        msystem: ${{ matrix.msystem }}
        path-type: minimal
        release: false
        update: false
        cache: false

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build
      if: ${{ github.event_name != 'release' || matrix.btype != 'Debug' }} # skip Debug configuration in Release build
      run: |
        make ${{ matrix.rule }} -j$(nproc) ARCH=${{ matrix.arch }} COMPILE_ARCH=${{ matrix.arch }} CC=${{ matrix.cc }} DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=vulkan CNAME=quake3e-vulkan BUILD_SERVER=0
        make clean ARCH=${{ matrix.arch }}
        make ${{ matrix.rule }} -j$(nproc) ARCH=${{ matrix.arch }} COMPILE_ARCH=${{ matrix.arch }} CC=${{ matrix.cc }} DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=opengl

    - name: Download soft_oal.dll
      if: ${{ github.event_name != 'release' || matrix.btype != 'Debug' }}
      shell: bash
      run: |
        ver=1.25.1
        zip="openal-soft-${ver}-bin.zip"
        curl -fsSL -o "${zip}" "https://github.com/kcat/openal-soft/releases/download/${ver}/${zip}"
        win_arch=$( [ "${{ matrix.arch }}" = "x86" ] && echo "Win32" || echo "Win64" )
        7z e "${zip}" "openal-soft-${ver}-bin/bin/${win_arch}/soft_oal.dll" -obin/ -y
        rm "${zip}"

    - uses: actions/upload-artifact@v4
      if: matrix.cc == 'gcc' && matrix.btype == 'Release'
      with:
        name: windows-${{ matrix.cc }}-${{ matrix.arch }}
        path: bin
        if-no-files-found: error
        retention-days: 5

  windows-msys32:
    name: ${{ matrix.btype }} Windows-msys32 ${{ matrix.arch }}
    if: github.event_name != 'release' || github.event.release.target_commitish == 're-impl'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x86_64]
#       btype: [Release, Debug]
        btype: [Release]
        include:
          - btype: Release
            rule: install

#         - btype: Debug
#           rule: debug

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Checkout msys32 tools from sibling repo
      uses: actions/checkout@v4
      with:
        repository: ec-/msys32
        path: msys

    - name: Extract msys32.7z
      run: |
        7z x %GITHUB_WORKSPACE%/msys/msys32.7z -o%GITHUB_WORKSPACE%/msys
      shell: cmd

    - name: Prepend msys/bin to PATH
      run: |
           echo "PATH=$GITHUB_WORKSPACE/msys/mingw/bin;$GITHUB_WORKSPACE/msys/bin;$GITHUB_WORKSPACE/msys" >> $GITHUB_ENV
      shell: bash

    - name: Build
      if: ${{ github.event_name != 'release' || matrix.btype != 'Debug' }} # skip Debug configuration in Release build
      shell: cmd
      run: |
        make ${{ matrix.rule }} ARCH=${{ matrix.arch }} DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=vulkan CNAME=quake3e-vulkan BUILD_SERVER=0
        make clean ARCH=${{ matrix.arch }}
        make ${{ matrix.rule }} ARCH=${{ matrix.arch }} DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=opengl

    - name: Download soft_oal.dll
      if: ${{ github.event_name != 'release' || matrix.btype != 'Debug' }}
      shell: bash
      run: |
        ver=1.25.1
        zip="openal-soft-${ver}-bin.zip"
        curl -fsSL -o "${zip}" "https://github.com/kcat/openal-soft/releases/download/${ver}/${zip}"
        win_arch=$( [ "${{ matrix.arch }}" = "x86" ] && echo "Win32" || echo "Win64" )
        7z e "${zip}" "openal-soft-${ver}-bin/bin/${win_arch}/soft_oal.dll" -obin/ -y
        rm "${zip}"

    - uses: actions/upload-artifact@v4
      if: matrix.btype == 'Release'
      with:
        name: windows-mingw-${{ matrix.arch }}
        path: bin
        if-no-files-found: error
        retention-days: 5

  windows-msvc:
    name: ${{ matrix.btype }} Windows-MSVC ${{ matrix.arch }}
    if: github.event_name != 'release' || github.event.release.target_commitish == 're-impl'
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64, x86, x64]
        btype: [Release, Debug]
        include:
          - arch: arm64
            platform: ARM64
            suffix: .arm64
            pkg_suffix: arm64

          - arch: x86
            platform: Win32
            pkg_suffix: x86

          - arch: x64
            platform: x64
            suffix: .x64
            pkg_suffix: x86_64

    steps:

    - uses: microsoft/setup-msbuild@v2

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build
      if: ${{ github.event_name != 'release' || matrix.btype != 'Debug' }} # skip Debug configuration in Release build
      run: |
        mkdir bin

        msbuild code\win32\msvc2017\quake3e-ded.vcxproj -p:TargetName=quake3e.ded,Configuration=${{ matrix.btype }},Platform=${{ matrix.platform }} /p:PlatformToolset=v143
        copy code\win32\msvc2017\output\quake3e.ded.exe bin\quake3e.ded${{ matrix.suffix }}.exe
        msbuild code\win32\msvc2017\quake3e-ded.vcxproj -p:TargetName=quake3e.ded,Configuration=${{ matrix.btype }},Platform=${{ matrix.platform }} -t:Clean

        msbuild code\win32\msvc2017\renderer.vcxproj -p:Configuration=${{ matrix.btype }},Platform=${{ matrix.platform }} /p:PlatformToolset=v143
        msbuild code\win32\msvc2017\quake3e.vcxproj -p:TargetName=quake3e,Configuration=${{ matrix.btype }},Platform=${{ matrix.platform }},UseWasapi=USE_WASAPI=0 /p:PlatformToolset=v143
        copy code\win32\msvc2017\output\quake3e.exe bin\quake3e${{ matrix.suffix }}.exe
        msbuild code\win32\msvc2017\renderer.vcxproj -p:Configuration=${{ matrix.btype }},Platform=${{ matrix.platform }} -t:Clean
        msbuild code\win32\msvc2017\quake3e.vcxproj -p:TargetName=quake3e,Configuration=${{ matrix.btype }},Platform=${{ matrix.platform }},UseWasapi=USE_WASAPI=0 -t:Clean

        msbuild code\win32\msvc2017\renderervk.vcxproj -p:Configuration=${{ matrix.btype }},Platform=${{ matrix.platform }} /p:PlatformToolset=v143
        msbuild code\win32\msvc2017\quake3e.vcxproj -p:TargetName=quake3e,Configuration=${{ matrix.btype }},Platform=${{ matrix.platform }},UseWasapi=USE_WASAPI=0 /p:PlatformToolset=v143
        copy code\win32\msvc2017\output\quake3e.exe bin\quake3e-vulkan${{ matrix.suffix }}.exe
        msbuild code\win32\msvc2017\renderervk.vcxproj -p:Configuration=${{ matrix.btype }},Platform=${{ matrix.platform }} -t:Clean
        msbuild code\win32\msvc2017\quake3e.vcxproj -p:TargetName=quake3e,Configuration=${{ matrix.btype }},Platform=${{ matrix.platform }},UseWasapi=USE_WASAPI=0 -t:Clean

    - name: Download soft_oal.dll
      if: ${{ github.event_name != 'release' || matrix.btype != 'Debug' }}
      shell: pwsh
      run: |
        $ver = "1.25.1"
        $zip = "openal-soft-$ver-bin.zip"
        Invoke-WebRequest "https://github.com/kcat/openal-soft/releases/download/$ver/$zip" -OutFile $zip
        $winArch = @{ x86 = "Win32"; x64 = "Win64"; arm64 = "ARM64" }["${{ matrix.arch }}"]
        7z e $zip "openal-soft-$ver-bin/bin/$winArch/soft_oal.dll" "-obin\" -y
        Remove-Item $zip

    - uses: actions/upload-artifact@v4
      if: ${{ matrix.btype == 'Release' }}
      with:
        name: windows-msvc-${{ matrix.pkg_suffix }}
        path: bin
        if-no-files-found: error
        retention-days: 5
        
  ubuntu-x86:
    name: ${{ matrix.btype }} Ubuntu ${{ matrix.arch }}
    if: github.event_name != 'release' || github.event.release.target_commitish == 're-impl'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x86_64]
        cc: [gcc]
        btype: [Release, Debug]
        include:
          - btype: Release
            rule: install

          - btype: Debug
            if: ${{ github.event_name != 'release' }}
            rule: debug

          - arch: x86
            use_sdl: USE_SDL=0

          - arch: x86_64
            use_sdl: USE_SDL=1

    steps:

    - name: Install tools
      run: |
        if [ ${{ matrix.arch }} == "x86" ]; then
          sudo dpkg --add-architecture i386
          sudo apt-get -qq update
          sudo apt-get -y install gcc-multilib libcurl4-openssl-dev:i386 mesa-common-dev:i386 libxxf86dga-dev:i386 libxrandr-dev:i386 libxxf86vm-dev:i386 libasound-dev:i386
        else
          sudo apt-get -qq update
          sudo apt-get -y install libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev libasound-dev libsdl2-dev
        fi

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build
      if: ${{ github.event_name != 'release' || matrix.btype != 'Debug' }} # skip in Release builds
      run: |
        make ${{ matrix.rule }} -j$(nproc) ARCH=${{ matrix.arch }} COMPILE_ARCH=${{ matrix.arch }} CC=${{ matrix.cc }} DESTDIR=bin ${{ matrix.use_sdl }} USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=vulkan CNAME=quake3e-vulkan BUILD_SERVER=0
        make clean ARCH=${{ matrix.arch }} 
        make ${{ matrix.rule }} -j$(nproc) ARCH=${{ matrix.arch }} COMPILE_ARCH=${{ matrix.arch }} CC=${{ matrix.cc }} DESTDIR=bin ${{ matrix.use_sdl }} USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=opengl

    - uses: actions/upload-artifact@v4
      if: matrix.cc == 'gcc' && matrix.btype == 'Release'
      with:
        name: linux-${{ matrix.arch }}
        path: bin
        if-no-files-found: error
        retention-days: 5

  ubuntu-arm:
    name: ${{ matrix.btype }} Ubuntu [ARM] ${{ matrix.arch }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [aarch64, armv7]
        cc: [gcc]
        btype: [Release, Debug]
        include:
          - btype: Release
            rule: install

          - btype: Debug
            rule: debug

    steps:

    - uses: actions/checkout@v4
      if: false
      with:
        submodules: recursive

    - name: Build ${{ matrix.arch }}
      #if: ${{ github.event_name != 'release' || matrix.btype != 'Debug' }} # skip Debug configuration in Release build
      if: false
      uses: uraimo/run-on-arch-action@v3
      with:
        arch: ${{ matrix.arch }}
        distro: ubuntu24.04
        githubToken: ${{ github.token }}
        shell: /bin/sh
        run: |
          apt-get -qq update
          apt-get install -y make gcc g++
          apt-get -y install libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev libasound-dev

          make ${{ matrix.rule }} -j$(nproc) ARCH=${{ matrix.arch }} CC=${{ matrix.cc }} DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=vulkan CNAME=quake3e-vulkan BUILD_SERVER=0
          make clean ARCH=${{ matrix.arch }} 
          make ${{ matrix.rule }} -j$(nproc) ARCH=${{ matrix.arch }} CC=${{ matrix.cc }} DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=opengl

    - uses: actions/upload-artifact@v4
      if: false
      #if: matrix.cc == 'gcc' && matrix.btype == 'Release'
      with:
        name: linux-${{ matrix.arch }}
        path: bin
        if-no-files-found: error
        retention-days: 5

  ubuntu-arm64:
    name: ${{ matrix.btype }} Ubuntu ${{ matrix.arch }}
    if: github.event_name != 'release' || github.event.release.target_commitish == 're-impl'
    runs-on: ubuntu-22.04-arm
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64]
        cc: [gcc]
        btype: [Release, Debug]
        include:
          - btype: Release
            rule: install

          - btype: Debug
            rule: debug

    steps:

    - name: Install tools
      run: |
        sudo apt-get -qq update
        sudo apt-get install -y make gcc g++
        sudo apt-get -y install libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev libasound-dev libsdl2-dev

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build
      if: ${{ github.event_name != 'release' || matrix.btype != 'Debug' }} # skip Debug configuration in Release build
      run: |
          make ${{ matrix.rule }} -j$(nproc) ARCH=${{ matrix.arch }} CC=${{ matrix.cc }} DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=vulkan CNAME=quake3e-vulkan BUILD_SERVER=0
          make clean ARCH=${{ matrix.arch }} 
          make ${{ matrix.rule }} -j$(nproc) ARCH=${{ matrix.arch }} CC=${{ matrix.cc }} DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=opengl

    - uses: actions/upload-artifact@v4
      if: matrix.cc == 'gcc' && matrix.btype == 'Release'
      with:
        name: linux-${{ matrix.arch }}
        path: bin
        if-no-files-found: error
        retention-days: 5

  macos-x86:
    name: ${{ matrix.btype }} macOS ${{ matrix.arch }}
    if: github.event_name != 'release' || github.event.release.target_commitish == 're-impl'
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        cc: [clang]
        btype: [Release, Debug]
        include:
          - btype: Release
            rule: install

          - btype: Debug
            rule: debug

    steps:

    - name: Install tools
      run: brew install coreutils sdl2 # pkg-config

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build
      if: ${{ github.event_name != 'release' || matrix.btype != 'Debug' }} # skip Debug configuration in Release build
      run: |
        make ${{ matrix.rule }} -j$(sysctl -n hw.logicalcpu) ARCH=${{ matrix.arch }} CC=${{ matrix.cc }} DESTDIR=bin INSTALL=ginstall USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=vulkan CNAME=quake3e-vulkan BUILD_SERVER=0 STRIP=echo
        make clean ARCH=${{ matrix.arch }} 
        make ${{ matrix.rule }} -j$(sysctl -n hw.logicalcpu) ARCH=${{ matrix.arch }} CC=${{ matrix.cc }} DESTDIR=bin INSTALL=ginstall USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=opengl STRIP=echo

    - uses: actions/upload-artifact@v4
      if: matrix.cc == 'clang' && matrix.btype == 'Release'
      with:
        name: macos-${{ matrix.arch }}
        path: bin
        if-no-files-found: error
        retention-days: 5

  create-testing:
    if: >-
      always() && !cancelled() &&
      github.ref == 'refs/heads/re-impl' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (needs.windows-msys32.result == 'success' || needs.windows-msvc.result == 'success' ||
       needs.ubuntu-x86.result == 'success' || needs.ubuntu-arm64.result == 'success' ||
       needs.macos-x86.result == 'success')
    needs: [windows-msys32, windows-msvc, ubuntu-x86, ubuntu-arm64, macos-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create binary archives
        run: |
          [ -d ./linux-x86 ]            && 7z a -r quake3e-linux-x86.zip            ./linux-x86/*            || true
          [ -d ./linux-x86_64 ]         && 7z a -r quake3e-linux-x86_64.zip         ./linux-x86_64/*         || true
          [ -d ./linux-arm64 ]          && 7z a -r quake3e-linux-arm64.zip          ./linux-arm64/*          || true
          [ -d ./windows-mingw-x86 ]    && 7z a -r quake3e-windows-mingw-x86.zip    ./windows-mingw-x86/*    || true
          [ -d ./windows-mingw-x86_64 ] && 7z a -r quake3e-windows-mingw-x86_64.zip ./windows-mingw-x86_64/* || true
          [ -d ./windows-msvc-arm64 ]   && 7z a -r quake3e-windows-msvc-arm64.zip   ./windows-msvc-arm64/*   || true
          [ -d ./macos-x86_64 ]         && 7z a -r quake3e-macos-x86_64.zip         ./macos-x86_64/*         || true
          [ -d ./macos-aarch64 ]        && 7z a -r quake3e-macos-aarch64.zip        ./macos-aarch64/*        || true
#         [ -d ./linux-aarch64 ]        && 7z a -r quake3e-linux-aarch64.zip        ./linux-aarch64/*        || true
#         [ -d ./linux-armv7 ]          && 7z a -r quake3e-linux-armv7.zip          ./linux-armv7/*          || true
#         [ -d ./windows-msvc-x86 ]     && 7z a -r quake3e-windows-msvc-x86.zip     ./windows-msvc-x86/*     || true
#         [ -d ./windows-msvc-x86_64 ]  && 7z a -r quake3e-windows-msvc-x86_64.zip  ./windows-msvc-x86_64/*  || true

      - name: Create latest build
        uses: czietz/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: "latest"
          prerelease: false
          title: Latest Build
          files: |
            *.zip

  update-release:
    if: >-
      always() && !cancelled() &&
      github.event_name == 'release' &&
      github.event.release.target_commitish == 're-impl' &&
      (needs.windows-msys32.result == 'success' || needs.windows-msvc.result == 'success' ||
       needs.ubuntu-x86.result == 'success' || needs.ubuntu-arm64.result == 'success' ||
       needs.macos-x86.result == 'success')
    needs: [windows-msys32, windows-msvc, ubuntu-x86, ubuntu-arm64, macos-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
#         - artifact_dir: linux-aarch64
#           artifact_name: quake3e-linux-aarch64.zip

#         - artifact_dir: linux-armv7
#           artifact_name: quake3e-linux-armv7.zip

          - artifact_dir: linux-x86
            artifact_name: quake3e-linux-x86.zip

          - artifact_dir: linux-x86_64
            artifact_name: quake3e-linux-x86_64.zip

          - artifact_dir: linux-arm64
            artifact_name: quake3e-linux-arm64.zip

          - artifact_dir: windows-mingw-x86
            artifact_name: quake3e-windows-x86.zip 

          - artifact_dir: windows-mingw-x86_64
            artifact_name: quake3e-windows-x86_64.zip

          - artifact_dir: windows-msvc-arm64
            artifact_name: quake3e-windows-arm64.zip

          - artifact_dir: macos-x86_64
            artifact_name: quake3e-macos-x86_64.zip

          - artifact_dir: macos-aarch64
            artifact_name: quake3e-macos-aarch64.zip

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create archive
        id: create_archive
        run: |
          if [ -d "./${{ matrix.artifact_dir }}" ]; then
            7z a -r ${{ matrix.artifact_name }} ./${{ matrix.artifact_dir }}/*
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "Artifact directory ${{ matrix.artifact_dir }} not found, skipping"
            echo "created=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload archive
        if: steps.create_archive.outputs.created == 'true'
        uses: "svenstaro/upload-release-action@latest"
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          overwrite: true
          file: ${{ matrix.artifact_name }}
