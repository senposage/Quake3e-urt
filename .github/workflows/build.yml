name: build

on:
  pull_request:
    branches:
      - re-impl
    paths-ignore:
      - '**.md'
      - '*.txt'
      - '.gitignore'
      - 'docs/*'
  push:
    branches:
      - re-impl
    paths-ignore:
      - '**.md'
      - '*.txt'
      - '.gitignore'
      - 'docs/*'
  release:
    types: [published]

  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-msys32:
    name: Windows ${{ matrix.arch }}
    if: github.event_name != 'release' || github.event.release.target_commitish == 're-impl'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x86_64]
        include:
          - arch: x86
            build_server: BUILD_SERVER=0
          - arch: x86_64
            build_server: ""

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4

    - name: Checkout msys32 tools from sibling repo
      uses: actions/checkout@v4
      with:
        repository: ec-/msys32
        path: msys

    - name: Extract msys32.7z
      run: |
        7z x %GITHUB_WORKSPACE%/msys/msys32.7z -o%GITHUB_WORKSPACE%/msys
      shell: cmd

    - name: Prepend msys/bin to PATH
      run: |
           echo "PATH=$GITHUB_WORKSPACE/msys/mingw/bin;$GITHUB_WORKSPACE/msys/bin;$GITHUB_WORKSPACE/msys" >> $GITHUB_ENV
      shell: bash

    - name: Build
      shell: cmd
      run: |
        make install ARCH=${{ matrix.arch }} DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=vulkan CNAME=quake3e-vulkan BUILD_SERVER=0
        make clean ARCH=${{ matrix.arch }}
        make install ARCH=${{ matrix.arch }} DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=opengl ${{ matrix.build_server }}

    - name: Download soft_oal.dll
      shell: bash
      run: |
        ver=1.25.1
        zip="openal-soft-${ver}-bin.zip"
        curl -fsSL -o "${zip}" "https://github.com/kcat/openal-soft/releases/download/${ver}/${zip}"
        win_arch=$( [ "${{ matrix.arch }}" = "x86" ] && echo "Win32" || echo "Win64" )
        7z e "${zip}" "openal-soft-${ver}-bin/bin/${win_arch}/soft_oal.dll" -obin/ -y
        rm "${zip}"

    - uses: actions/upload-artifact@v4
      with:
        name: windows-${{ matrix.arch }}
        path: bin
        if-no-files-found: error
        retention-days: 5

  ubuntu-x86:
    name: Linux ${{ matrix.arch }}
    if: github.event_name != 'release' || github.event.release.target_commitish == 're-impl'
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x86_64]
        include:
          - arch: x86
            use_sdl: USE_SDL=0
            build_server: BUILD_SERVER=0

          - arch: x86_64
            use_sdl: USE_SDL=1
            build_server: ""

    steps:

    - name: Install tools
      run: |
        if [ ${{ matrix.arch }} == "x86" ]; then
          sudo dpkg --add-architecture i386
          sudo apt-get -qq update
          sudo apt-get -y install gcc-multilib libcurl4-openssl-dev:i386 mesa-common-dev:i386 libxxf86dga-dev:i386 libxrandr-dev:i386 libxxf86vm-dev:i386 libasound-dev:i386 libopenal1:i386
        else
          sudo apt-get -qq update
          sudo apt-get -y install libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev libasound-dev libsdl2-dev libopenal1
        fi

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build
      run: |
        make install -j$(nproc) ARCH=${{ matrix.arch }} COMPILE_ARCH=${{ matrix.arch }} CC=gcc DESTDIR=bin ${{ matrix.use_sdl }} USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=vulkan CNAME=quake3e-vulkan BUILD_SERVER=0
        make clean ARCH=${{ matrix.arch }}
        make install -j$(nproc) ARCH=${{ matrix.arch }} COMPILE_ARCH=${{ matrix.arch }} CC=gcc DESTDIR=bin ${{ matrix.use_sdl }} USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=opengl ${{ matrix.build_server }}

    - name: Bundle libopenal.so.1
      run: |
        so=$(find /usr/lib -name "libopenal.so.1" | head -1)
        if [ -z "$so" ]; then echo "ERROR: libopenal.so.1 not found after install" >&2; exit 1; fi
        cp "$so" bin/libopenal.so.1

    - uses: actions/upload-artifact@v4
      with:
        name: linux-${{ matrix.arch }}
        path: bin
        if-no-files-found: error
        retention-days: 5

  create-testing:
    if: >-
      always() && !cancelled() &&
      github.ref == 'refs/heads/re-impl' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      (needs.windows-msys32.result == 'success' || needs.ubuntu-x86.result == 'success')
    needs: [windows-msys32, ubuntu-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create binary archives
        run: |
          [ -d ./linux-x86 ]       && 7z a -r quake3e-linux-x86.zip       ./linux-x86/*       || true
          [ -d ./linux-x86_64 ]    && 7z a -r quake3e-linux-x86_64.zip    ./linux-x86_64/*    || true
          [ -d ./windows-x86 ]     && 7z a -r quake3e-windows-x86.zip     ./windows-x86/*     || true
          [ -d ./windows-x86_64 ]  && 7z a -r quake3e-windows-x86_64.zip  ./windows-x86_64/*  || true

      - name: Create latest build
        uses: czietz/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: "latest"
          prerelease: false
          title: Latest Build
          files: |
            *.zip

  update-release:
    if: >-
      always() && !cancelled() &&
      github.event_name == 'release' &&
      github.event.release.target_commitish == 're-impl' &&
      (needs.windows-msys32.result == 'success' || needs.ubuntu-x86.result == 'success')
    needs: [windows-msys32, ubuntu-x86]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_dir: linux-x86
            artifact_name: quake3e-linux-x86.zip

          - artifact_dir: linux-x86_64
            artifact_name: quake3e-linux-x86_64.zip

          - artifact_dir: windows-x86
            artifact_name: quake3e-windows-x86.zip

          - artifact_dir: windows-x86_64
            artifact_name: quake3e-windows-x86_64.zip

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create archive
        id: create_archive
        run: |
          if [ -d "./${{ matrix.artifact_dir }}" ]; then
            7z a -r ${{ matrix.artifact_name }} ./${{ matrix.artifact_dir }}/*
            echo "created=true" >> $GITHUB_OUTPUT
          else
            echo "Artifact directory ${{ matrix.artifact_dir }} not found, skipping"
            echo "created=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload archive
        if: steps.create_archive.outputs.created == 'true'
        uses: "svenstaro/upload-release-action@latest"
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          overwrite: true
          file: ${{ matrix.artifact_name }}
