name: build-arm

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-22.04-arm

    steps:

    - name: Install tools
      run: |
        sudo apt-get -qq update
        sudo apt-get install -y make gcc g++
        sudo apt-get -y install libcurl4-openssl-dev mesa-common-dev libxxf86dga-dev libxrandr-dev libxxf86vm-dev libasound-dev libsdl2-dev libopenal1

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build
      run: |
        make install -j$(nproc) ARCH=arm64 CC=gcc DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=vulkan CNAME=quake3e-vulkan BUILD_SERVER=0
        make clean ARCH=arm64
        make install -j$(nproc) ARCH=arm64 CC=gcc DESTDIR=bin USE_SDL=0 USE_RENDERER_DLOPEN=0 RENDERER_DEFAULT=opengl

    - name: Bundle libopenal.so.1
      run: |
        so=$(find /usr/lib -name "libopenal.so.1" | head -1)
        if [ -z "$so" ]; then echo "ERROR: libopenal.so.1 not found after install" >&2; exit 1; fi
        cp "$so" bin/libopenal.so.1

    - uses: actions/upload-artifact@v4
      with:
        name: linux-arm64
        path: bin
        if-no-files-found: error
        retention-days: 5
