// =============================================================================
// Quake3e-urt / Urban Terror 4.3  - server.cfg Production Configuration
// =============================================================================
// Requires: quake3e.ded.x64 built from the re-impl branch.
// Vanilla quake3e.ded.x64 will ignore custom cvars silently.
//
// Tick rate tiers (change the sv_fps / sv_snapshotFps lines to switch):
//
//   TIER    sv_fps  sv_snapshotFps  sv_busyWait  sv_maxRate
//   ---------------------------------------------------------
//   40Hz    40      40              0            40000
//   60Hz    60      60              0            60000    <- DEFAULT
//   125Hz   125     125             0            100000
//
// Shadow recording runs at sv_fps Hz (one sample per engine tick).
// sv_gameHz stays at 20 regardless of tier - it controls QVM timer speed only.
// =============================================================================


// -----------------------------------------------------------------------------
// SERVER IDENTITY
// -----------------------------------------------------------------------------

sv_hostname          "My UrbanTerror Server"
sv_motd              "Welcome"
g_password           ""                  // leave empty for public server
rconPassword         "changeme"          // CHANGE THIS
sv_maxclients        32                  // 16 for medium, 32 for large


// -----------------------------------------------------------------------------
// NETWORK
// -----------------------------------------------------------------------------

net_port             27960

// sv_maxRate: maximum downstream bytes/sec the server will send a client.
// Raise this in line with sv_fps - at 60Hz snapshots are 50% more frequent
// than vanilla 20Hz and need proportionally more headroom.
//   40Hz  ->  40000
//   60Hz  ->  60000  (default)
//   125Hz -> 100000
sv_maxRate           60000
sv_minRate           8000

sv_maxPing           300                 // kick clients over this ping (0=disabled)
sv_minPing           0                   // set e.g. 20 to level LAN vs internet


// -----------------------------------------------------------------------------
// ENGINE TICK RATE
// -----------------------------------------------------------------------------

// sv_fps: engine tick rate. ClientThink runs here. Snapshots built here.
// Shadow antilag records once per tick, i.e. at sv_fps Hz.
// QVM timers are NOT affected (see sv_gameHz below).
sv_fps               60

// sv_gameHz: QVM tick rate. level.time and GAME_RUN_FRAME advance at this rate.
// KEEP AT 20 - all UT4.3 timers (respawns, weapons, rounds) are tuned for 20Hz.
// Changing this will break game logic. It exists only to decouple QVM from sv_fps.
sv_gameHz            20

// sv_snapshotFps: snapshot send rate. Client "snaps" userinfo is ignored.
// Hard-capped to sv_fps internally. Set equal to sv_fps.
sv_snapshotFps       60

// sv_busyWait: spin-wait N ms before frame boundary instead of sleeping.
// Eliminates OS scheduler jitter. Costs ~1 CPU core at 100%.
// Scale down as sv_fps increases (frame budget shrinks):
//   The timeResidual fix makes this unnecessary under normal conditions.
sv_busyWait          0


// -----------------------------------------------------------------------------
// SHADOW ANTILAG
// -----------------------------------------------------------------------------

// Master switch. 0 falls back to vanilla QVM 20Hz FIFO antilag only.
sv_antilag           1

// Maximum rewind window (ms). Covers all practical pings.
sv_antilagMaxMs      200

// Logging - off in production. Enable briefly to verify behaviour:
//   sv_antilagDebug 1       per-shot trace results
//   sv_antilagDebug 2       verbose per-client rewind detail
//   sv_antilagRateDebug 1   observed snapshot rate per client every 5s
sv_antilagDebug      0
sv_antilagRateDebug  0


// -----------------------------------------------------------------------------
// PHYSICS NORMALISATION
// -----------------------------------------------------------------------------

// Maximum physics step per usercmd regardless of client framerate.
// 8ms = 125fps-equivalent steps for all clients.
// A 30fps client (33ms steps) is capped and catches up across ticks.
// A 250fps client (4ms steps) is unaffected.
// 0 = disabled (variable step, vanilla behaviour).
sv_pmoveMsec         8


// -----------------------------------------------------------------------------
// GAME SETTINGS
// -----------------------------------------------------------------------------

g_gametype           7                   // FTL - change to your mode
g_timelimit          15
g_capturelimit       0
g_friendlyFire       1
g_teamForceBalance   0
g_allowVote          1
g_warmup             10
g_doWarmup           1

// sv_antilag 1 auto-forces g_antilag 0 (engine takes over all hit registration).
// Set g_antilag 1 here as the fallback used when sv_antilag is off.
g_antilag            1

g_gravity            800
g_speed              320
g_weaponrespawn      5
g_inactivity         0                   // kick idle clients after N seconds (0=off)
g_forcerespawn       0


// -----------------------------------------------------------------------------
// PURE / SECURITY
// -----------------------------------------------------------------------------

sv_pure              1
sv_allowDownload     1
sv_dlRate            100
g_log                "games.log"
g_logsync            0


// -----------------------------------------------------------------------------
// MAP ROTATION
// -----------------------------------------------------------------------------

set d1 "map ut4_abbey;     set nextmap vstr d2"
set d2 "map ut4_algiers;   set nextmap vstr d3"
set d3 "map ut4_austria;   set nextmap vstr d4"
set d4 "map ut4_casa;      set nextmap vstr d5"
set d5 "map ut4_kingdom;   set nextmap vstr d1"

vstr d1


// =============================================================================
// END server.cfg
// =============================================================================
